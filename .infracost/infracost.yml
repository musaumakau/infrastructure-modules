version: 0.1

# Configure all your Terraform modules
projects:
  - path: eks/
    name: "EKS Cluster"
    terraform_var_files:
      - 7-terraform.tfvars.example

  - path: vpc/
    name: "VPC Infrastructure"
    terraform_var_files:
      - 9-terraform.tfvars.example

  - path: kubernetes-addons/
    name: "Kubernetes Add-ons"
    terraform_var_files:
      - terraform.tfvars.example

policies:
  - path: policies/

# Optional: Global settings
settings:
  # Show all projects even if cost is $0
  show_all_projects: true