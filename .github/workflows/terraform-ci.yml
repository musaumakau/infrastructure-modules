# .github/workflows/terraform-ci.yml
name: Terraform Checks

on:
  push:
    branches: [main, feat/terratest-eks]
  pull_request:

# [T1-1] Deny-by-default — each reusable workflow declares its own permissions
permissions:
  contents: read
  security-events: write
  id-token: write
  pull-requests: write

# [T2-2] One plan per PR branch — safe to cancel on PR, never cancel on push
concurrency:
  group: tf-checks-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── 1. Secret scan ──────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan [gitleaks]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── 2. Changed module detection ─────────────────────────────────────────────
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    needs: [secret-scan]
    timeout-minutes: 3
    permissions:
      contents: read
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
      plannable-modules: ${{ steps.detect.outputs.plannable-modules }}
      # New: whether eks or vpc changed — gates the integration test job
      eks-or-vpc-changed: ${{ steps.detect.outputs.eks-or-vpc-changed }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Detect changed modules
        id: detect
        run: |
          set -euo pipefail
          chmod +x .github/scripts/detect-changed-modules.sh
          BASE_REF="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD~1' }}"
          MODULES=$(.github/scripts/detect-changed-modules.sh "$BASE_REF" HEAD)
          echo "modules=${MODULES}" >> "$GITHUB_OUTPUT"
          echo "has-changes=$( [ "$MODULES" = '[]' ] && echo 'false' || echo 'true' )" >> "$GITHUB_OUTPUT"

          PLANNABLE=$(echo "$MODULES" | python3 -c "
          import json, sys
          all_m = json.load(sys.stdin)
          skip = {'kubernetes-addons', 'cicd-state'}
          print(json.dumps([m for m in all_m if m not in skip]))
          ")
          echo "plannable-modules=${PLANNABLE}" >> "$GITHUB_OUTPUT"

          # Gate for integration tests: true if eks or vpc is in changed modules
          EKS_OR_VPC=$(echo "$MODULES" | python3 -c "
          import json, sys
          changed = json.load(sys.stdin)
          print('true' if any(m in changed for m in ['eks', 'vpc']) else 'false')
          ")
          echo "eks-or-vpc-changed=${EKS_OR_VPC}" >> "$GITHUB_OUTPUT"

          echo "Changed modules: $MODULES"
          echo "Plannable modules: $PLANNABLE"
          echo "EKS or VPC changed: $EKS_OR_VPC"

  # ── 3. Validate (changed modules only) ──────────────────────────────────────
  validate:
    name: Validate
    needs: [detect-changes]
    if: needs.detect-changes.outputs.has-changes == 'true'
    uses: ./.github/workflows/reusable-validate.yml
    with:
      modules: ${{ needs.detect-changes.outputs.modules }}

  # ── 4. Security scan (changed modules × scanners, PR only) ──────────────────
  security-scan:
    name: Security scan
    needs: [detect-changes]
    if: |
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.has-changes == 'true'
    uses: ./.github/workflows/reusable-security-scan.yml
    with:
      modules: ${{ needs.detect-changes.outputs.modules }}

  # ── 5. Plan + blast radius (changed plannable modules) ──────────────────────
  plan-and-score:
    name: Plan & blast radius
    needs: [validate, detect-changes]
    if: |
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') &&
      needs.detect-changes.outputs.plannable-modules != '[]'
    uses: ./.github/workflows/reusable-plan-and-score.yml
    with:
      modules: ${{ needs.detect-changes.outputs.plannable-modules }}
      environment: Dev
    secrets:
      REPO_DISPATCH_PAT: ${{ secrets.REPO_DISPATCH_PAT }}
      GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}

  # ── 5b. Infracost + policy (PR only, plannable modules) ─────────────────────
  infracost:
    name: Cost & policy
    needs: [plan-and-score, detect-changes]
    if: |
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.plannable-modules != '[]'
    uses: ./.github/workflows/reusable-infracost.yml
    with:
      modules: ${{ needs.detect-changes.outputs.plannable-modules }}
      run-id: ${{ github.run_id }}
    secrets:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

  # ── 6. EKS integration tests (eks/vpc changed, test branch or PR to main) ───
  # Runs after validate so we know the modules at least parse correctly before
  # spending ~40 min provisioning real infrastructure.
  eks-integration-tests:
    name: EKS integration tests
    needs: [validate, detect-changes]
    if: |
      needs.detect-changes.outputs.eks-or-vpc-changed == 'true' &&
      (
        github.ref == 'refs/heads/feat/terratest-eks' ||
        (github.event_name == 'pull_request' && github.base_ref == 'main')
      )
    uses: ./.github/workflows/reusable-eks-tests.yml
    with:
      terraform-version: '1.7.5'
      aws-region: 'eu-west-1'
    secrets:
      REPO_DISPATCH_PAT: ${{ secrets.REPO_DISPATCH_PAT }}

  # ── 7. Dispatch live deploy (push to main only) ──────────────────────────────
  dispatch-live-deploy:
    name: Trigger infra-live deployment
    needs: [validate, plan-and-score, detect-changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable-dispatch.yml
    with:
      sha: ${{ github.sha }}
    secrets:
      REPO_DISPATCH_PAT: ${{ secrets.REPO_DISPATCH_PAT }}