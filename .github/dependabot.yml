# .github/dependabot.yml
version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Africa/Nairobi"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
    ignore:
      # Trivy — never auto-update, supply chain attack history
      - dependency-name: "aquasecurity/trivy*"

  # Terraform version updates
  - package-ecosystem: terraform
    directory: /vpc
    schedule:
      interval: weekly
    labels:
      - dependencies
      - terraform
    commit-message:
      prefix: "chore(terraform)"

  - package-ecosystem: terraform
    directory: /eks
    schedule:
      interval: weekly
    labels:
      - dependencies
      - terraform
    commit-message:
      prefix: "chore(terraform)"

  - package-ecosystem: terraform
    directory: /kubernetes-addons
    schedule:
      interval: weekly
    labels:
      - dependencies
      - terraform
    commit-message:
      prefix: "chore(terraform)"