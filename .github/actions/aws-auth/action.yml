name: 'AWS OIDC auth'
description: 'Assume an IAM role via OIDC — no long-lived keys'

inputs:
  role-arn:
    description: 'ARN of the IAM role to assume'
    required: false
    default: 'arn:aws:iam::649203810550:role/EksOIDCRole'  
  aws-region:
    description: 'AWS region'
    required: false
    default: 'eu-west-1'    
  session-name-suffix:
    description: 'Appended to github-actions- for the session name'
    required: false
    default: '${{ github.run_id }}'

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f  # v4.0.2 SHA-pinned
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}
        role-session-name: "github-actions-${{ inputs.session-name-suffix }}" 